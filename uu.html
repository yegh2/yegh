<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页gh|特殊符号</title>
    <style>
        .a{border: 2px solid black; border-radius: 20px; width: 10vw; color: black; background-color: white; transition: all 0.3s;}
        .a:hover{color: white; background-color: black;}
        .cho{border: 2px solid black; border-radius: 10px; width: 50px; height: 50px; color: black; background-color: white; transition: all 0.3s; margin: 10px;}
        .cho:hover{color: white; background-color: black;}
        .b{display: none; text-align: center; justify-content: center; font-size: 30px; flex-wrap: wrap}
    </style>
</head>
<body style="margin: 0;">
    <div style="font-size: 10vw; text-align: center; margin: 20px;">特殊符号大全</div>
    <hr>
    <div style="height: 5vh;"></div>
    <div style="display: flex; text-align: center; justify-content: space-evenly; font-size: 2vw;">
        <div class="a" duiying="b1" onclick="xianshi(this)">上标 下标</div>
        <div class="a" duiying="b2" onclick="xianshi(this)">单位</div>
        <div class="a" duiying="b3" onclick="xianshi(this)">特殊数字</div>
        <div class="a" duiying="b4" onclick="xianshi(this)">标点</div>
        <div class="a" duiying="b5" onclick="xianshi(this)">数学</div>
        <div class="a" duiying="b6" onclick="xianshi(this)">几何</div>
        <div class="a" duiying="b7" onclick="xianshi(this)">字母 拼音</div>
        <div class="a" duiying="b8" onclick="xianshi(this)">其他</div>
    </div>
    <div style="height: 10vh;"></div>

    <div id="b1" class="b">
        <div class="cho" onclick="copy(this)">⁰</div>
        <div class="cho" onclick="copy(this)">¹</div>
        <div class="cho" onclick="copy(this)">²</div>
        <div class="cho" onclick="copy(this)">³</div>
        <div class="cho" onclick="copy(this)">⁴</div>
        <div class="cho" onclick="copy(this)">⁵</div>
        <div class="cho" onclick="copy(this)">⁶</div>
        <div class="cho" onclick="copy(this)">⁷</div>
        <div class="cho" onclick="copy(this)">⁸</div>
        <div class="cho" onclick="copy(this)">⁹</div>
        <div class="cho" onclick="copy(this)">⁺</div>
        <div class="cho" onclick="copy(this)">⁻</div>
        <div class="cho" onclick="copy(this)">⁼</div>
        <div class="cho" onclick="copy(this)">⁽</div>
        <div class="cho" onclick="copy(this)">⁾</div>
        <div class="cho" onclick="copy(this)">˙</div>
        <div class="cho" onclick="copy(this)">₀</div>
        <div class="cho" onclick="copy(this)">₁</div>
        <div class="cho" onclick="copy(this)">₂</div>
        <div class="cho" onclick="copy(this)">₃</div>
        <div class="cho" onclick="copy(this)">₄</div>
        <div class="cho" onclick="copy(this)">₅</div>
        <div class="cho" onclick="copy(this)">₆</div>
        <div class="cho" onclick="copy(this)">₇</div>
        <div class="cho" onclick="copy(this)">₈</div>
        <div class="cho" onclick="copy(this)">₉</div>
        <div class="cho" onclick="copy(this)">₊</div>
        <div class="cho" onclick="copy(this)">₋</div>
        <div class="cho" onclick="copy(this)">₌</div>
        <div class="cho" onclick="copy(this)">₍</div>
        <div class="cho" onclick="copy(this)">₎</div>
        <div class="cho" onclick="copy(this)">就</div>
    </div>

    <script>
        last = 0
        function copy(el){
            var val = el.innerText;
            // console.log(navigator)
            // console.log(navigator.Clipboard)
            // navigator.Clipboard.writeText(val);
            copyToClipboard(val)
        };
        function xianshi(el){
            if (last != 0){
                last.style.display = 'none'
            }
            var el = document.getElementById(`${el.getAttribute('duiying')}`)
            el.style.display = 'flex'
            last = el
        }

        function copyToClipboard(text, successCB) {
            const textarea = document.createElement('textarea');
            textarea.value = text; // 直接赋值包含换行符的文本
            textarea.style.position = 'fixed'; // 避免滚动问题
            document.body.appendChild(textarea);
            textarea.select();
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    // Message.success('复制成功!')
                    successCB && successCB()
                } else {
                    // Message.error('本设备不支持复制!')
                }
            } catch (err) {
                // Message.error('复制失败' + err)
            }
            document.body.removeChild(textarea); // 清理
        }
    </script>

</body>
</html>
