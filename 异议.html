<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页gh|异议</title>
</head>
<body>
    <div id="accxyz"></div>
    <div id="mouxyz"></div>
    <select id="neirong" onchange="changeNeirong(this.value)">
        <option value="objection">Objection</option>
        <option value="igiari">異議あり!</option>
        <option value="matta">待った!</option>
        <option value="kurae">くらえ!</option>
    </select>
    <button onclick="requestPermission()">开始</button>
    <img src="异议/objection.png" alt="Objection" style="display: none;" id="img">
    <script>
        // 默认选中的音频对象（与第一个 option 一致）
        let Sound = new Audio('异议/objection.mp3');

        function changeNeirong(value) {
            // 更新图片
            document.getElementById("img").src = `异议/${value}.png`;
            document.getElementById("img").alt = `异议/${value}.png`;
            // 更新音频对象
            Sound = new Audio(`异议/${value}.mp3`);
        }

        function requestPermission() {
            unlockAudio();
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') {
                            startListening();
                        } else {
                            alert('需要运动传感器权限才能使用');
                        }
                    })
                    .catch(console.error);
            } else {
                startListening();
            }
        }

        function unlockAudio() {
            Sound.play().then(() => {
                Sound.pause();
                Sound.currentTime = 0;
            }).catch(e => console.warn('音频解锁失败', e));
        }

        function once() {
            Sound.currentTime = 0;
            Sound.play();
            setTimeout(() => {
                document.getElementById("img").style.display = 'none';
            }, 1000);
            document.getElementById("img").style.display = 'block';
        }

        function startListening() {
            window.addEventListener('devicemotion', (event) => {
                const acc = event.acceleration || {};
                const x = acc.x ?? 0;
                const y = acc.y ?? 0;
                const z = acc.z ?? 0;

                if (x > 0.5 || x < -0.5 || y > 0.5 || y < -0.5 || z > 0.5 || z < -0.5) {
                    once();
                } 
                document.getElementById("accxyz").innerHTML = `X: ${x.toFixed(2)}, Y: ${y.toFixed(2)}, Z: ${z.toFixed(2)}`;
            });

            var lastMouseX = event.clientX;
            var lastMouseY = event.clientY;
            document.addEventListener('mousemove', function(event) {
                // 获取鼠标坐标
                if (event.clientX - lastMouseX != 0 || event.clientY - lastMouseY !== 0) {
                    once();
                }
                lastMouseX = event.clientX;
                lastMouseY = event.clientY;
                document.getElementById("mouxyz").innerHTML = `X: ${lastMouseX.toFixed(2)}, Y: ${lastMouseY.toFixed(2)}`;
            });
        }
    </script>
</body>
</html>
