<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页gh|异议</title>
</head>
<body>
    <img src="异议/objection.png" alt="Objection" style="display: none;" id="img">
    <div id="xyz"></div>
    <select id="neirong">
        <option value="igiari" onclick="changeNeirong(this.value)">異議あり!</option>
        <option value="objection" onclick="changeNeirong(this.value)">Objection</option>
        <option value="0.3" onclick="changeNeirong(this.value)">111</option>
    </select>
    <button onclick="requestPermission()">开始</button>
    <script>
        function changeNeirong(value) {
            var neirong = value;
            document.getElementById("img").src = `异议/${neirong}.png`;
            document.getElementById("img").alt = `异议/${neirong}.png`;
        }

        function requestPermission() {
            unlockAudio();
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') {
                            startListening();
                        } else {
                            alert('需要运动传感器权限才能使用');
                        }
                    })
                    .catch(console.error);
            } else {
                // Android 或旧版 iOS 直接监听即可
                startListening();
            }
        }

        const Sound = new Audio(`异议/${neirong}.mp3`);

        function unlockAudio() {
            // 尝试播放后立即暂停，获得后续播放权限
            Sound.play().then(() => {
                Sound.pause();
                Sound.currentTime = 0;
            }).catch(e => console.warn('音频解锁失败', e));
}

        function startListening() {
            window.addEventListener('devicemotion', (event) => {
                const acc = event.acceleration || {};
                const x = acc.x ?? 0;
                const y = acc.y ?? 0;
                const z = acc.z ?? 0;

                if (x > 0.2 || x < -0.2 || y > 0.2 || y < -0.2 || z > 0.2 || z < -0.2) {
                    Sound.currentTime = 0;
                    Sound.play();
                    setTimeout(() => {
                        document.getElementById("img").style.display = 'none';
                    }, 1000);
                    document.getElementById("img").style.display = 'block';
                } 
                document.getElementById("xyz").innerHTML = `X: ${x.toFixed(2)}, Y: ${y.toFixed(2)}, Z: ${z.toFixed(2)}`;
            });
        }
    </script>
</body>
</html>
