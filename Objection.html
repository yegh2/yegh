<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页gh|Objection</title>
</head>
<body>
    <div id="xyz"></div>
    <button onclick="getAcc()">111</button>
    <script>
        function getAcc() {
            DeviceMotionEvent.requestPermission()
            var accx = event.acceleration.x;
            var accy = event.acceleration.y;
            var accz = event.acceleration.z;
            document.getElementById("xyz").innerHTML = "X: " + accx + "<br>Y: " + accy + "<br>Z: " + accz;
        }
    </script>
</body>
</html>
